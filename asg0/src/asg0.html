<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Vector Playground</title>
    <style>
      body {
        margin: 0;
        padding: 8px 16px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .student-info {
        width: 100%;
        max-width: 400px;
        text-align: center;
        margin: 0 0 -10px;
        padding: 0;
        font: 15px/1.2 system-ui, -apple-system, Segoe UI, sans-serif;
        color: #222;
      }
      .student-info p {
        margin: 0;
        line-height: 1.15;
      }
      #layoutRoot {
        margin-top: -8px;
      }
      #example {
        display: block;
        max-width: none !important;
      }
    </style>
  </head>

  <body onload="main()">
    <header class="student-info">
      <p><strong>Name:</strong> Nick Lafredo</p>
      <p><strong>Email:</strong> nlafredo@ucsc.edu</p>

    </canvas>

</html>
